# $schema: ../Schemas/operation.schema.json
- ir: "complete-ef-structure"
  desc: "Structure of all ef core members throughout the whole project"
  parameters:
    entities:
      $type: array
      arr:
        $type: node
        node: "entity-bare-def"
    relations:
      $type: array
      arr:
        $type: node
        node: "entity-relation-def"
  subtasks:
    entityFields:
      $type: map
      task:
        $type: converter
        converter: "extract-node-leaf"
        args:
          source:
            $type: fromParameter
            parameterKey: entities
          field:
            $type: leaf
            template: "name"
    allNavigationProps:
      $type: converter
      converter: "extract-navigation-props-for-entities"
      args:
        entities:
          $type: fromSubtask
          subtaskKey: entityFields
          outputKey: result
        relations:
          $type: fromParameter
          parameterKey: relations
    entities:
      $type: map
      task:
        $type: operation
        operation: "ef-entity-class"
        args:
          bare:
            $type: fromParameter
            parameterKey: entities
          navigationProps:
            $type: fromSubtask
            subtaskKey: allNavigationProps
            outputKey: result
  outputs:
    entities:
      $type: fromSubtask
      subtaskKey: entities
      outputKey: result

- ir: "ef-entity-class"
  desc: "Structure of an ef core entity class"
  parameters:
    bareDef:
      $type: node
      node: "entity-bare-def"
    referenceNavigations:
      $type: array
      arr:
        $type: leaf
    collectionNavigations:
      $type: array
      arr:
        $type: leaf
  subtasks:
    name:
      $type: converter
      converter: "extract-nodes-leaves"
      args: 
        source:
          $type: fromParameter
          parameterKey: bareDef
        field:
          $type: leaf
          template: "name"
  outputs:
    class:
      $type: nodeBlueprint
      blueprint:
        node: "class-def"
        args:
          
  